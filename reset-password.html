<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; form-action 'self'; base-uri 'none';">
  <title>New Password — CARS SSO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="particles"></div>
  <div class="card">
    <div class="card-glow"></div>
    <div class="emblem" aria-hidden="true">
      <div class="emblem-ring"></div>
      <div class="emblem-bg">🔐</div>
    </div>
    <h1 class="heading">New password</h1>
    <p class="subtitle">Set a new password for your account</p>

    <div id="status-box" class="status-box" role="alert" aria-live="assertive" aria-atomic="true"></div>

    <form id="reset-form" novalidate>
      <div class="field">
        <label for="new-password">New Password</label>
        <div class="input-wrap">
          <input type="password" id="new-password" name="new-password"
            placeholder="Enter new password"
            autocomplete="new-password" maxlength="128"
            required aria-required="true" aria-describedby="password-rules status-box">
          <button type="button" class="btn-pwd-toggle" aria-label="Show password" data-target="new-password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <ul id="password-rules" class="password-rules" aria-label="Password requirements" aria-live="polite">
        <li class="rule" id="rule-length"  role="listitem"><span class="rule-icon" aria-hidden="true">✗</span> 8+ characters</li>
        <li class="rule" id="rule-upper"   role="listitem"><span class="rule-icon" aria-hidden="true">✗</span> Uppercase (A–Z)</li>
        <li class="rule" id="rule-lower"   role="listitem"><span class="rule-icon" aria-hidden="true">✗</span> Lowercase (a–z)</li>
        <li class="rule" id="rule-number"  role="listitem"><span class="rule-icon" aria-hidden="true">✗</span> Number (0–9)</li>
        <li class="rule" id="rule-special" role="listitem"><span class="rule-icon" aria-hidden="true">✗</span> Symbol (@$!%*?&amp;)</li>
      </ul>
      <div class="field">
        <label for="confirm-password">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="confirm-password" name="confirm-password"
            placeholder="Re-enter your new password"
            autocomplete="new-password" maxlength="128"
            required aria-required="true" aria-describedby="confirm-hint status-box">
          <button type="button" class="btn-pwd-toggle" aria-label="Show confirm password" data-target="confirm-password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <p id="confirm-hint" class="input-hint">Must match the password above</p>
      <button type="submit" id="reset-btn" class="btn-primary">Save New Password</button>
    </form>

    <div class="footer-link">
      <a href="/login">Cancel and return to sign in</a>
    </div>
  </div>
  <script src="/effects.js"></script>
  <script src="/script.js"></script>
</body>
</html>
