<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Gradient for shield -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for behavioral wave -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34D399;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="46" fill="#0A0E23"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="#1E293B" stroke-width="1"/>

  <!-- Shield shape -->
  <path d="M50 18
           C50 18, 68 22, 72 26
           L72 52
           C72 68, 50 78, 50 78
           C50 78, 28 68, 28 52
           L28 26
           C32 22, 50 18, 50 18 Z"
        fill="url(#shieldGrad)"
        filter="url(#shadow)"
        opacity="0.95"/>

  <!-- Shield border highlight -->
  <path d="M50 20
           C50 20, 66 23.5, 70 27
           L70 52
           C70 66, 50 75, 50 75
           C50 75, 30 66, 30 52
           L30 27
           C34 23.5, 50 20, 50 20 Z"
        fill="none"
        stroke="rgba(255,255,255,0.2)"
        stroke-width="1"/>

  <!-- Behavioral/AI wave pattern inside shield -->
  <path d="M35 50
           Q38 45, 41 50
           T47 50
           T53 50
           T59 50
           T65 50"
        fill="none"
        stroke="url(#waveGrad)"
        stroke-width="3"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Neural connection dots -->
  <circle cx="41" cy="50" r="2.5" fill="#22D3EE" filter="url(#glow)"/>
  <circle cx="47" cy="50" r="2.5" fill="#34D399" filter="url(#glow)"/>
  <circle cx="53" cy="50" r="2.5" fill="#60A5FA" filter="url(#glow)"/>
  <circle cx="59" cy="50" r="2.5" fill="#8B5CF6" filter="url(#glow)"/>

  <!-- SSO connection lines (bottom of shield) -->
  <path d="M42 62 L45 65 L48 62"
        fill="none"
        stroke="rgba(255,255,255,0.6)"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <path d="M52 62 L55 65 L58 62"
        fill="none"
        stroke="rgba(255,255,255,0.6)"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Center lock/keyhole element (subtle) -->
  <circle cx="50" cy="38" r="4" fill="rgba(255,255,255,0.9)"/>
  <path d="M48 41 L48 44 L52 44 L52 41"
        fill="rgba(255,255,255,0.9)"/>
</svg>
