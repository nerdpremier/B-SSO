<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; form-action 'self'; base-uri 'none';">
  <title>Welcome — CARS SSO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    .session-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--ok-bg);
      border: 1px solid var(--ok-bd);
      border-radius: 20px;
      padding: 5px 14px 5px 10px;
      font-size: 12px; font-weight: 600; color: var(--ok);
      margin-bottom: 14px;
    }
    .session-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 7px var(--ok);
      animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(.75); }
    }

    .welcome-user {
      font-size: 14px; color: var(--ink-2);
      margin-bottom: 28px;
    }
    .welcome-user strong { font-weight: 700; color: var(--gold); }

    .action-divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 14px;
      color: var(--ink-3);
      font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    }
    .action-divider::before, .action-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .btn-portal {
      display: block; width: 100%;
      padding: 13px 20px;
      background: var(--surface-2);
      border: 1px solid var(--border-h);
      border-radius: var(--radius-btn);
      color: var(--ink);
      font-family: var(--font);
      font-size: 14.5px; font-weight: 600;
      cursor: pointer; text-align: center;
      transition: border-color .2s, background .2s, color .2s;
      margin-bottom: 10px;
      position: relative; overflow: hidden;
    }
    .btn-portal:hover {
      border-color: var(--border-act);
      background: var(--gold-bg);
      color: var(--gold);
    }
    .btn-portal:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--focus-ring); }

    .btn-signout {
      display: block; width: 100%;
      padding: 13px 20px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      color: var(--ink-3);
      font-family: var(--font);
      font-size: 14.5px; font-weight: 600;
      cursor: pointer; text-align: center;
      transition: border-color .2s, color .2s, background .2s;
      position: relative; overflow: hidden;
    }
    .btn-signout:hover {
      border-color: var(--err-bd);
      color: var(--err);
      background: var(--err-bg);
    }
    .btn-signout:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(255,85,85,.2); }
  </style>
</head>
<body class="auth-pending">
  <div class="auth-layout">
    <div class="auth-card" style="text-align:center;">

      <div class="brand-row" style="justify-content:center;" data-stagger>
        <div class="brand-logo" aria-hidden="true">🚗</div>
        <span class="brand-name">CARS SSO</span>
      </div>

      <div style="font-size:40px; margin-bottom:16px;" aria-hidden="true" data-stagger>✓</div>

      <h1 class="page-title" data-stagger>Access <em>granted</em></h1>

      <div class="session-badge" data-stagger>
        <div class="session-dot" aria-hidden="true"></div>
        <span>Session active</span>
      </div>

      <p class="welcome-user" aria-label="Loading user…" data-stagger>
        Signed in as <strong id="user-display">…</strong>
      </p>

      <div class="action-divider" data-stagger><span>Quick actions</span></div>

      <button type="button" id="dev-portal-btn" class="btn-portal" data-stagger>
        🔗 Developer Portal
      </button>

      <button type="button" id="logout-btn" class="btn-signout" data-stagger>
        Sign Out
      </button>

    </div>
  </div>
  <script src="/effects.js"></script>
  <script src="/script.js"></script>
</body>
</html>
