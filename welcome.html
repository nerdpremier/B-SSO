<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; form-action 'self'; base-uri 'none';">
  <title>Welcome — CARS SSO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    /* ── Welcome-page extras ── */
    .welcome-wrap {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .welcome-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px 34px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(12,20,37,.06), 0 16px 48px rgba(12,20,37,.09);
      animation: cardIn .45s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Success check */
    .check-wrap {
      width: 52px; height: 52px;
      background: var(--ok-bg);
      border: 2px solid var(--ok-bd);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      font-size: 22px; color: var(--ok);
      animation: cardIn .45s cubic-bezier(.16,1,.3,1) .08s both;
    }

    .welcome-title {
      font-family: 'Syne', sans-serif;
      font-size: 24px; font-weight: 800;
      color: var(--ink);
      letter-spacing: -.4px;
      margin-bottom: 14px;
      animation: cardIn .45s cubic-bezier(.16,1,.3,1) .12s both;
    }

    /* Session badge */
    .session-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--ok-bg);
      border: 1.5px solid var(--ok-bd);
      border-radius: 20px;
      padding: 5px 13px 5px 9px;
      font-size: 12px; font-weight: 700; color: #065F46;
      margin-bottom: 10px;
      animation: cardIn .45s cubic-bezier(.16,1,.3,1) .18s both;
    }
    .session-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 6px var(--ok);
      animation: dotPulse 2.2s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .55; transform: scale(.8); }
    }

    /* User line */
    .welcome-user {
      font-size: 13.5px;
      color: var(--muted);
      margin-bottom: 26px;
      animation: cardIn .45s cubic-bezier(.16,1,.3,1) .22s both;
    }
    .welcome-user strong {
      font-weight: 800;
      color: var(--accent);
    }

    /* Divider */
    .welcome-divider {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
      color: var(--dim);
      font-size: 11px; font-weight: 700;
      letter-spacing: .4px; text-transform: uppercase;
      animation: cardIn .45s cubic-bezier(.16,1,.3,1) .26s both;
    }
    .welcome-divider::before,
    .welcome-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Developer Portal button */
    .btn-portal {
      display: block; width: 100%;
      padding: 13px 20px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--ink-2);
      font-family: 'Manrope', sans-serif;
      font-size: 14.5px; font-weight: 700;
      cursor: pointer; text-align: center;
      transition: border-color .18s, background .18s, box-shadow .18s;
      margin-bottom: 10px;
      animation: cardIn .45s cubic-bezier(.16,1,.3,1) .3s both;
      position: relative; overflow: hidden;
    }
    .btn-portal:hover {
      border-color: var(--accent);
      background: var(--accent-l);
      color: var(--accent-d);
    }
    .btn-portal:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--focus-ring); }

    /* Sign Out button */
    .btn-signout {
      display: block; width: 100%;
      padding: 13px 20px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-family: 'Manrope', sans-serif;
      font-size: 14.5px; font-weight: 700;
      cursor: pointer; text-align: center;
      transition: border-color .18s, color .18s, background .18s;
      animation: cardIn .45s cubic-bezier(.16,1,.3,1) .34s both;
      position: relative; overflow: hidden;
    }
    .btn-signout:hover {
      border-color: var(--err-bd);
      color: var(--err);
      background: var(--err-bg);
    }
    .btn-signout:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(224,57,62,.18); }
  </style>
</head>
<body class="auth-pending">
  <div class="welcome-wrap">
    <div class="welcome-card">

      <div class="check-wrap" aria-hidden="true">✓</div>

      <h1 class="welcome-title">Access Granted</h1>

      <div class="session-badge">
        <div class="session-dot" aria-hidden="true"></div>
        <span>Session active</span>
      </div>

      <p class="welcome-user" aria-label="Loading user…">
        Signed in as <strong id="user-display">…</strong>
      </p>

      <div class="welcome-divider"><span>Quick actions</span></div>

      <button type="button" id="dev-portal-btn" class="btn-portal">
        🔗 Developer Portal
      </button>

      <button type="button" id="logout-btn" class="btn-signout">
        Sign Out
      </button>

    </div>
  </div>

  <script src="/effects.js"></script>
  <script src="/script.js"></script>
</body>
</html>
