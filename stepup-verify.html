<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; form-action 'self'; base-uri 'none';">
  <title>Step-up Verification — B-SSO</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card">

      <h1 class="page-title" data-stagger>Verify your <em>identity</em></h1>
      <p class="page-subtitle" data-stagger>A security check was triggered. Enter the 6-digit code we sent to your email.</p>

      <div id="status-box" class="status-box" role="alert" aria-live="assertive" aria-atomic="true" data-stagger hidden></div>

      <form id="stepup-form" novalidate data-stagger>
        <div class="field">
          <label for="stepup-code">Verification Code</label>
          <input type="text" id="stepup-code" name="stepup-code"
            class="mfa-input"
            placeholder="000000"
            inputmode="numeric"
            autocomplete="one-time-code"
            pattern="[0-9]{6}"
            minlength="6" maxlength="6"
            required aria-required="true" aria-describedby="status-box">
        </div>
        <button type="submit" id="stepup-verify-btn" class="btn-primary">Verify Code</button>
      </form>

      <div class="footer-link" data-stagger>
        <p class="mfa-footer-note">
          Didn&apos;t receive a code?
          <button type="button" id="resend-btn" class="btn-link">Resend Code</button>
        </p>
        <a href="#" id="cancel-link" class="mfa-cancel-link">← Return to application</a>
      </div>

    </div>
  </div>
  <script src="/effects.js"></script>
  <script>
    (function() {
      const statusBox = document.getElementById('status-box');
      const form = document.getElementById('stepup-form');
      const codeInput = document.getElementById('stepup-code');
      const verifyBtn = document.getElementById('stepup-verify-btn');
      const resendBtn = document.getElementById('resend-btn');
      const cancelLink = document.getElementById('cancel-link');

      let challengeId = null;
      let returnUrl = null;
      let csrfToken = null;
      let resendTimeout = null;

      // Parse URL parameters
      function initializeParams() {
        const params = new URLSearchParams(window.location.search);
        challengeId = params.get('challenge_id');
        returnUrl = params.get('return_url');

        if (!challengeId || !returnUrl) {
          showError('Invalid or missing parameters. No challenge or return URL provided.');
          form.style.display = 'none';
          resendBtn.style.display = 'none';
          return false;
        }

        // Set cancel link to return_url
        cancelLink.href = returnUrl;
        return true;
      }

      // Fetch CSRF token
      async function getCsrfToken() {
        try {
          const response = await fetch('/api/csrf', {
            method: 'GET',
            headers: {
              'Accept': 'application/json'
            }
          });
          if (!response.ok) {
            throw new Error('Failed to fetch CSRF token');
          }
          const data = await response.json();
          csrfToken = data.token;
        } catch (error) {
          console.error('CSRF token fetch error:', error);
          showError('Unable to initialize security. Please refresh and try again.');
        }
      }

      // Show status message
      function showStatus(message, type) {
        statusBox.textContent = message;
        statusBox.className = `status-box ${type}`;
        statusBox.hidden = false;
      }

      function showError(message) {
        showStatus(message, 'danger');
      }

      function showSuccess(message) {
        showStatus(message, 'success');
      }

      function showLoading(message) {
        showStatus(message, 'loading');
      }

      // Clear status
      function clearStatus() {
        statusBox.hidden = true;
        statusBox.textContent = '';
        statusBox.className = 'status-box';
      }

      // Verify OTP code
      async function verifyCode(code) {
        if (!csrfToken) {
          showError('Security token missing. Please refresh the page.');
          return;
        }

        showLoading('Verifying code...');
        verifyBtn.disabled = true;
        verifyBtn.classList.add('btn--loading');

        try {
          const response = await fetch('/api/stepup', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify({
              action: 'redirect-verify',
              challenge_id: challengeId,
              code: code
            })
          });

          const data = await response.json();

          if (!response.ok) {
            if (response.status === 429) {
              showError('Too many attempts. Please try again later.');
            } else if (data.error === 'Code expired') {
              showError('Verification code has expired. Please request a new one.');
              codeInput.value = '';
              codeInput.focus();
            } else if (data.error === 'Wrong code') {
              showError('The code you entered is incorrect. Please try again.');
              codeInput.value = '';
              codeInput.focus();
            } else if (data.error === 'Challenge already verified') {
              showSuccess('Already verified. Redirecting...');
              setTimeout(() => { window.location.href = returnUrl; }, 1000);
              return;
            } else {
              showError(data.error || 'Verification failed. Please try again.');
              codeInput.value = '';
              codeInput.focus();
            }
            return;
          }

          // Success
          showSuccess('Code verified successfully. Redirecting...');
          const stepupToken = data.stepup_token || data.token;
          const redirectUrl = returnUrl + (returnUrl.includes('?') ? '&' : '?') +
                              `stepup_verified=1&stepup_token=${encodeURIComponent(stepupToken)}`;

          setTimeout(() => {
            document.body.classList.add('page-exit');
            setTimeout(() => {
              window.location.href = redirectUrl;
            }, 200);
          }, 600);
        } catch (error) {
          console.error('Verification error:', error);
          showError('Network error. Please check your connection and try again.');
        } finally {
          verifyBtn.disabled = false;
          verifyBtn.classList.remove('btn--loading');
        }
      }

      // Resend code
      async function resendCode() {
        if (!csrfToken) {
          showError('Security token missing. Please refresh the page.');
          return;
        }

        showLoading('Resending code...');
        resendBtn.disabled = true;

        try {
          const response = await fetch('/api/stepup', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRF-Token': csrfToken
            },
            body: JSON.stringify({
              action: 'redirect-resend',
              challenge_id: challengeId
            })
          });

          const data = await response.json();

          if (!response.ok) {
            if (response.status === 429) {
              showError('Too many resend attempts. Please try again in a few minutes.');
            } else {
              showError(data.message || 'Failed to resend code. Please try again.');
            }
            return;
          }

          // Update challengeId if a new one was returned
          if (data.new_challenge_id) {
            challengeId = data.new_challenge_id;
          }
          showSuccess('New code sent to your email. Check your inbox.');
          codeInput.value = '';
          codeInput.focus();

          // Disable resend for 60 seconds
          resendBtn.disabled = true;
          let countdown = 60;
          resendBtn.textContent = `Resend Code (${countdown}s)`;

          resendTimeout = setInterval(() => {
            countdown--;
            if (countdown > 0) {
              resendBtn.textContent = `Resend Code (${countdown}s)`;
            } else {
              clearInterval(resendTimeout);
              resendBtn.disabled = false;
              resendBtn.textContent = 'Resend Code';
            }
          }, 1000);
        } catch (error) {
          console.error('Resend error:', error);
          showError('Network error. Please try again.');
        }
      }

      // Form submission
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const code = codeInput.value.trim();

        if (code.length !== 6 || !/^\d{6}$/.test(code)) {
          showError('Please enter a valid 6-digit code.');
          return;
        }

        verifyCode(code);
      });

      // Resend button
      resendBtn.addEventListener('click', (e) => {
        e.preventDefault();
        resendCode();
      });

      // Auto-focus and format input
      codeInput.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
      });

      // Initialize
      if (initializeParams()) {
        getCsrfToken();
      }
    })();
  </script>
</body>
</html>
